name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:

  unit_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install -r dev-requirements.txt

      - name: Run Pytest
        run: |
          export PYTHONPATH=$PWD
          pytest tests/

  sast_bandit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Scan
        run: bandit -r app/

  sca_pipaudit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          pip install pip-audit
          pip install  --no-cache-dir -r requirements.txt

      - name: Run pip-audit
        run: |
          pip-audit \
          --ignore-vuln CVE-2024-47874 \
          --ignore-vuln CVE-2025-54121

  secret_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build_and_push:
    runs-on: ubuntu-latest

    needs:
      - unit_test
      - sast_bandit
      - sca_pipaudit
      - secret_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Commit SHA
        id: vars
        run: echo "SHA_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notes-app:latest .
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notes-app:${SHA_TAG} .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/notes-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/notes-app:${SHA_TAG}

  trivy_scan:
    runs-on: ubuntu-latest

    needs:
      - build_and_push

    steps:
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/notes-app:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
